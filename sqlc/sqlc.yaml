version: "2"
sql:
  - engine: "postgresql"
    queries: "../internal/queries"
    schema: "../migrations"
    gen:
      go:
        package: "query"
        out: "../internal/query"
        sql_package: "pgx/v5"
        overrides:
          # UUID
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true

          # TIMESTAMP WITH TIME ZONE
          - db_type: "timestamptz"
            nullable: false  # поле NOT NULL
            go_type: "time.Time"  # просто time.Time, без указателя
          
          - db_type: "timestamptz"
            nullable: true  # поле может быть NULL
            go_type:
              import: "time"
              type: "Time"
              pointer: true  # *time.Time для nullable полей

          # TIMESTAMP
          - db_type: "timestamp"
            nullable: false
            go_type: "time.Time"
          
          - db_type: "timestamp"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true

          # Текстовые поля (включая varchar)
          - db_type: "text"
            nullable: false
            go_type: "string"
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          
          - db_type: "varchar"
            nullable: false
            go_type: "string"
          - db_type: "varchar"
            nullable: true
            go_type:
              type: "string"
              pointer: true

          # Boolean
          - db_type: "bool"
            nullable: false
            go_type: "bool"
          - db_type: "bool"
            nullable: true
            go_type:
              type: "bool"
              pointer: true

          # JSON / JSONB — json.RawMessage (удобно для прозрачной отдачи)
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "jsonb"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
              pointer: true
          - db_type: "json"
            go_type: "encoding/json.RawMessage"
          - db_type: "json"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
              pointer: true
